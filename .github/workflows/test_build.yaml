name: Custom vcpkg registry tester

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VCPKG_COMMIT_SHA: 56bb2411609227288b70117ead2c47585ba07713 # corresponds to tag 2026.04.27

jobs:
  cross-platform-test-build:
    name: Cross platform test build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Windows-msvc2022
            os: windows-2022
            compiler: msvc-2022
            build-cversion: 17
            build-runtime: MD
            build-config: Release
            build-arch: x86_64

    steps:
      - name: Checkout registry repo
        uses: actions/checkout@v6

      - name: Set up binary cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-cache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.build-cversion }}-${{ env.VCPKG_COMMIT_SHA }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-overlays/**') }}
          restore-keys: |
            vcpkg-cache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.build-cversion }}-${{ env.VCPKG_COMMIT_SHA }}
  
      - name: Clone vcpkg
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          path: .vcpkg
          ref: ${{ env.VCPKG_COMMIT_SHA }}

      - name: Set vcpkg environment (Windows)
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          echo "VCPKG_DIR=${{ github.workspace }}\.vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=${{ github.workspace }}\.vcpkg" >> $env:GITHUB_ENV

      - name: Bootstrap vcpkg (Windows)
        if: startsWith(runner.os, 'Windows')
        run: | 
          ${{ github.workspace }}\.vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo ${{ github.workspace }}\.vcpkg\ >> $GITHUB_PATH

      - name: Set vcpkg config file (Windows)
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          echo "VCPKG_FEATURE_FLAGS=registries" >> $env:GITHUB_ENV
          echo "VCPKG_CONFIG_FILE=${{ github.workspace }}\test\registry-tester\vcpkg-configuration.json" >> $env:GITHUB_ENV
          dir ${{ github.workspace }}
          dir ${{ github.workspace }}\ports
          dir ${{ github.workspace }}\ports\qt
          dir ${{ github.workspace }}\versions
          dir ${{ github.workspace }}\versions\q-

      - name: Debug vcpkg registry resolution
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        working-directory: test\registry-tester
        run: |
          Write-Host "=== Check for competing vcpkg-configuration.json files ==="
          Get-ChildItem -Path D:\a\vcpkg-registry\vcpkg-registry -Filter vcpkg-configuration.json -Recurse | Select-Object FullName
          Write-Host "=== VCPKG_ROOT vcpkg-configuration.json ==="
          if (Test-Path "$env:VCPKG_ROOT\vcpkg-configuration.json") {
            Get-Content "$env:VCPKG_ROOT\vcpkg-configuration.json"
          } else {
            Write-Host "Not found in VCPKG_ROOT"
          }
          Write-Host "=== Running vcpkg install with debug ==="
          & "$env:VCPKG_ROOT\vcpkg.exe" install --debug 2>&1
        continue-on-error: true

      - name: Set vcpkg config file dynamically (Windows)
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          echo "VCPKG_FEATURE_FLAGS=registries" >> $env:GITHUB_ENV
          echo "VCPKG_CONFIG_FILE=${{ github.workspace }}\test\registry-tester\vcpkg-configuration.json" >> $env:GITHUB_ENV
          $registryPath = "${{ github.workspace }}".Replace("\", "/")
          $config = @"
          {
            "default-registry": {
              "kind": "git",
              "repository": "https://github.com/microsoft/vcpkg",
              "baseline": "${{ env.VCPKG_COMMIT_SHA }}"
            },
            "registries": [
              {
                "kind": "filesystem",
                "path": "$registryPath",
                "packages": ["qt"]
              }
            ]
          }
          "@
          $config | Set-Content "${{ github.workspace }}\test\registry-tester\vcpkg-configuration.json"
          Write-Host "=== Generated vcpkg-configuration.json ==="
          Get-Content "${{ github.workspace }}\test\registry-tester\vcpkg-configuration.json"
      - name: Debug vcpkg registry resolution
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        working-directory: test\registry-tester
        run: |
          Write-Host "=== VCPKG_FEATURE_FLAGS: $env:VCPKG_FEATURE_FLAGS ==="
          Write-Host "=== VCPKG_ROOT: $env:VCPKG_ROOT ==="
          Write-Host "=== vcpkg-configuration.json contents ==="
          Get-Content vcpkg-configuration.json
          Write-Host "=== Running vcpkg install with debug ==="
          & "$env:VCPKG_ROOT\vcpkg.exe" install --debug 2>&1
        continue-on-error: true

      - name: Configure tester project   # this drives the port build
        if: startsWith(runner.os, 'Windows')
        working-directory: test\registry-tester
        run: |
          cmake --trace-expand --preset vcpkg-windows -S . -B .\build

      - name: Upload vcpkg install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-manifest-install-log
          path: test/registry-tester/build/vcpkg-manifest-install.log
      - name: Build tester
        working-directory: test\registry-tester
        run: cmake --build .\build