name: Custom vcpkg registry tester

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VCPKG_COMMIT_SHA: 56bb2411609227288b70117ead2c47585ba07713 # corresponds to tag 2026.04.27

jobs:
  prepare_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix_setup.outputs.matrix }}
    steps:
    - name: Get matrix from file
      id: matrix_setup
      uses: ManiVaultStudio/github-actions/matrix_setup@main

  cross-platform-test-build:
    name: Cross platform test build
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Checkout registry repo
        uses: actions/checkout@v6

      - name: Set up binary cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-cache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.build-cversion }}-${{ env.VCPKG_COMMIT_SHA }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-overlays/**') }}
          restore-keys: |
            vcpkg-cache-${{ runner.os }}-${{ matrix.os }}-${{ matrix.build-cversion }}-${{ env.VCPKG_COMMIT_SHA }}

  
      - name: Clone vcpkg
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          path: .vcpkg

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 

      - name: Bootstrap vcpkg and python
        shell: pwsh
        run: | 
          echo "VCPKG_ROOT=${{ github.workspace }}\.vcpkg" >> $env:GITHUB_ENV
          if ($env:RUNNER_OS -eq "Windows") {
            & "${{ github.workspace }}\.vcpkg\bootstrap-vcpkg.bat" -disableMetrics
            $python = Join-Path $env:pythonLocation "python.exe"
          } else {
            & "${{ github.workspace }}\.vcpkg\bootstrap-vcpkg.sh" -disableMetrics
            $python = Join-Path $env:pythonLocation "python3"
          }
          echo ${{ github.workspace }}\.vcpkg\ >> $GITHUB_PATH
          echo "VCPKG_FEATURE_FLAGS=registries" >> $env:GITHUB_ENV
          $config_path = Join-Path ${{ github.workspace }} test registry-tester vcpkg-configuration.json
          echo "VCPKG_CONFIG_FILE=$config-path" >> $env:GITHUB_ENV
          echo "PYTHON3_EXECUTABLE=$python" >> $env:GITHUB_ENV
          $test_workdir = Join-Path ${{ github.workspace }} test registry-tester
          echo "TEST_WORKDIR=$test_workdir" >> $env:GITHUB_ENV

      - name: Install required Python packages
        shell: pwsh
        run: |
          & "$env:PYTHON3_EXECUTABLE" -m pip install --upgrade pip
          & "$env:PYTHON3_EXECUTABLE" -m pip install requests packaging colorama

      - name: Configure tester project   # this drives the port build
        shell: pwsh
        env:
          VCPKG_KEEP_ENV_VARS: "PYTHON3_EXECUTABLE;SEVEN_ZIP_EXECUTABLE"
          VCPKG_BINARY_SOURCES: "clear;http,${{ secrets.VCPKG_ARTIFACTORY_URL }}/{name}/{version}/{triplet}/{sha},readwrite,Authorization: Bearer ${{ secrets.VCPKG_ARTIFACTORY_TOKEN }}" 
        run: |
          Set-Location "$env:TEST_WORKDIR"
          $sevenZip = (Get-Command 7z).Source
          echo "7z at $sevenZip"
          $env:SEVEN_ZIP_EXECUTABLE = $sevenZip
          $preset = if ($IsWindows) { "vcpkg-windows" }
            elseif ($IsLinux) { "vcpkg-linux" }
            else { "vcpkg-macos" }
          cmake --preset $preset -S . -B .\build  

      - name: Upload vcpkg install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-manifest-install-log
          path: test/registry-tester/build/vcpkg-manifest-install.log
      - name: Build tester
        working-directory: "$env{TEST_WORKDIR}"
        shell: pwsh
        run: | 
          Set-Location "$env:TEST_WORKDIR"
          cmake --build .\build